x-db-common-env: &db-common-env
  POSTGRES_HOST: ${POSTGRES_HOST_CONTAINER:-postgres}
  POSTGRES_PORT: "5432"
  POSTGRES_DB: ${POSTGRES_DB:-welding_drift}
  POSTGRES_USER: ${POSTGRES_USER:-welding}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.airflow
  image: welding-airflow:3.1.8
  # Local lab mode: Airflow tasks need docker.sock access for docker exec/run.
  # Use root by default to avoid socket permission failures.
  user: "${AIRFLOW_UID:-0}:0"
  environment:
    &airflow-common-env
    <<: *db-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    # PIP requirements are now in Dockerfile.airflow
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-welding}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-welding_drift}
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-}
    AIRFLOW__API__SECRET_KEY: ${AIRFLOW_API_SECRET_KEY:-welding-airflow-api-secret-key}
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_WEBSERVER_SECRET_KEY:-welding-airflow-webserver-secret-key}
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__FAB__AUTH_ROLE_PUBLIC: "Admin"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "True"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: "http://airflow-webserver:8080/execution/"
    AIRFLOW__EXECUTION_API__JWT_EXPIRATION_TIME: ${AIRFLOW_EXECUTION_API_JWT_EXPIRATION_TIME:-7200}
    AIRFLOW__CORE__INTERNAL_API_SECRET_KEY: ${AIRFLOW_INTERNAL_API_SECRET_KEY:-welding-airflow-internal-api-secret-key}
    AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW_API_AUTH_JWT_SECRET:-welding-airflow-api-auth-jwt-secret}
    CONSUMER_COUNT: ${CONSUMER_COUNT:-2}
    EXPECTED_LASER_A: ${EXPECTED_LASER_A:-1}
    EXPECTED_LASER_B: ${EXPECTED_LASER_B:-1}
    REPLAY_LINE_COUNT: ${REPLAY_LINE_COUNT:-2}
    AIRFLOW_CONN_KAFKA_DEFAULT: kafka://kafka:9092
    AIRFLOW_CONN_SPARK_DEFAULT: spark://spark-master:7077
    AIRFLOW_CONN_WELDING_POSTGRES: postgresql://${POSTGRES_USER:-welding}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-welding_drift}
    SPARK_BATCH_OUTPUT_DIR: ${SPARK_BATCH_OUTPUT_DIR:-/spark-out/spark_batch}
    BACKFILL_STORAGE_DIR: ${BACKFILL_STORAGE_DIR:-/spark-out/spark_batch}
    SPARK_INTERMEDIATE_ROOTS: ${SPARK_INTERMEDIATE_ROOTS:-/spark-out/intermediate,/spark-out/spark_batch/intermediate}
    # Airflow 3 Auth Manager explicit setting
    AIRFLOW__CORE__AUTH_MANAGER: "airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager"
    DOCKER_HOST: unix:///var/run/docker.sock
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - airflow-logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    - ./scripts:/opt/airflow/scripts:ro
    - spark-batch-output:/spark-out
    - /var/run/docker.sock:/var/run/docker.sock
  networks:
    - welding-net
  depends_on:
    postgres:
      condition: service_healthy
    kafka-init:
      condition: service_completed_successfully
    spark-master:
      condition: service_started

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.3
    container_name: welding-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zk-data:/var/lib/zookeeper/data
      - zk-log:/var/lib/zookeeper/log
    networks:
      - welding-net
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc localhost 2181 | grep 'Zookeeper version'"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.5.3
    container_name: welding-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "${KAFKA_EXTERNAL_PORT:-29092}:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://${KAFKA_EXTERNAL_HOST:-localhost}:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_NUM_PARTITIONS: 8
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_MESSAGE_MAX_BYTES: 5242880
      KAFKA_REPLICA_FETCH_MAX_BYTES: 5242880
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 536870912
      KAFKA_HEAP_OPTS: "-Xms512m -Xmx1g"
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - welding-net
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 30s

  airflow-dag-processor:
    <<: *airflow-common
    command: dag-processor
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -m airflow jobs check --job-type DagProcessorJob"]
      interval: 30s
      timeout: 30s
      retries: 8
      start_period: 120s

  airflow-triggerer:
    <<: *airflow-common
    command: triggerer
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", 'python -m airflow jobs check --job-type TriggererJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 30s
      retries: 8
      start_period: 120s

  kafka-init:
    image: confluentinc/cp-kafka:7.5.3
    container_name: welding-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-ec"]
    command:
      - |
        echo 'Creating Kafka topics'
        # retention.ms: DB 적재 완료 전 오류가 나도 Kafka에서 재처리할 수 있도록 보존한다.
        # 기본값 604800000 = 7일. KAFKA_TOPIC_RETENTION_MS 환경변수로 조정 가능.
        RETENTION="${KAFKA_TOPIC_RETENTION_MS:-604800000}"
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic welding.raw.v1 --partitions 8 --replication-factor 1 --config retention.ms=$${RETENTION} --config compression.type=producer --config max.message.bytes=5242880
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic welding.raw.laser_a.v1 --partitions 8 --replication-factor 1 --config retention.ms=$${RETENTION} --config compression.type=producer --config max.message.bytes=5242880
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic welding.raw.laser_b.v1 --partitions 8 --replication-factor 1 --config retention.ms=$${RETENTION} --config compression.type=producer --config max.message.bytes=5242880
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic welding.validated.v1 --partitions 8 --replication-factor 1 --config retention.ms=$${RETENTION} --config compression.type=producer
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic welding.features.v1 --partitions 8 --replication-factor 1 --config retention.ms=2592000000 --config cleanup.policy=compact,delete --config compression.type=producer
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic welding.quality_decision.v1 --partitions 4 --replication-factor 1 --config retention.ms=2592000000
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic welding.dlq.v1 --partitions 4 --replication-factor 1 --config retention.ms=$${RETENTION}
        kafka-topics --bootstrap-server kafka:9092 --list
        echo "Kafka topic initialization done (retention.ms=$${RETENTION})"
    networks:
      - welding-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: welding-kafka-ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "${KAFKA_UI_PORT:-8089}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: welding-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      DYNAMIC_CONFIG_ENABLED: "true"
    networks:
      - welding-net

  postgres:
    image: postgres:16
    container_name: welding-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-welding_drift}
      POSTGRES_USER: ${POSTGRES_USER:-welding}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    networks:
      - welding-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-welding} -d ${POSTGRES_DB:-welding_drift}"]
      interval: 10s
      timeout: 5s
      retries: 10

  spark-master:
    build:
      context: .
      dockerfile: Dockerfile.spark
    image: welding-spark:3.5.1
    container_name: welding-spark-master
    user: "0:0"
    restart: unless-stopped
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    ports:
      - "${SPARK_MASTER_PORT:-7077}:7077"
      - "${SPARK_MASTER_UI_PORT:-18080}:8080"
    command:
      [
        "/opt/spark/bin/spark-class",
        "org.apache.spark.deploy.master.Master",
        "--host",
        "spark-master",
        "--port",
        "7077",
        "--webui-port",
        "8080"
      ]
    volumes:
      - spark-events:/opt/spark/events
      - ${DATA_DIR:?set DATA_DIR in .env}:/data:ro
      - ${STORAGE_DIR:?set STORAGE_DIR in .env}:/storage
      - spark-batch-output:/spark-out
      - ./spark_batch.py:/opt/spark/apps/spark_batch.py:ro
      - ./spark_streaming.py:/opt/spark/apps/spark_streaming.py:ro
      # Spark consumer 로그를 호스트와 공유: FastAPI가 docker exec 없이 읽을 수 있음
      # 실험 종료 후 storage/logs/ 에서 로그 파일을 직접 확인 가능
      - ./storage/logs:/storage/logs
    environment:
      <<: *db-common-env
    networks:
      - welding-net

  spark-worker:
    build:
      context: .
      dockerfile: Dockerfile.spark
    image: welding-spark:3.5.1
    container_name: welding-spark-worker
    user: "0:0"
    restart: unless-stopped
    depends_on:
      spark-master:
        condition: service_started
    ports:
      - "${SPARK_WORKER_UI_PORT:-18081}:8081"
    command:
      [
        "/opt/spark/bin/spark-class",
        "org.apache.spark.deploy.worker.Worker",
        "spark://spark-master:7077",
        "--webui-port",
        "8081",
        "--cores",
        "2",
        "--memory",
        "6g"
      ]
    volumes:
      - spark-events:/opt/spark/events
      - ${DATA_DIR:?set DATA_DIR in .env}:/data:ro
      - ${STORAGE_DIR:?set STORAGE_DIR in .env}:/storage
      - spark-batch-output:/spark-out
      - ./spark_batch.py:/opt/spark/apps/spark_batch.py:ro
      - ./spark_streaming.py:/opt/spark/apps/spark_streaming.py:ro
    environment:
      <<: *db-common-env
    networks:
      - welding-net

  airflow-init:
    <<: *airflow-common
    container_name: welding-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    container_name: welding-airflow-webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      spark-master:
        condition: service_started
    command: api-server
    ports:
      - "${AIRFLOW_WEBSERVER_PORT:-8080}:8080"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -f http://localhost:8080/api/v2/monitor/health || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    container_name: welding-airflow-scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      spark-master:
        condition: service_started
    command: scheduler
    restart: unless-stopped

  producer:
    build:
      context: .
      dockerfile: Dockerfile.producer
    container_name: welding-producer
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    environment:
      <<: *db-common-env
      KAFKA_BOOTSTRAP: kafka:9092
      TOPIC_RAW: welding.raw.v1
      TOPIC_RAW_LASER_A: welding.raw.laser_a.v1
      TOPIC_RAW_LASER_B: welding.raw.laser_b.v1
      DATA_DIR: /data
      STORAGE_DIR: /storage
    volumes:
      - ${DATA_DIR:?set DATA_DIR in .env}:/data:ro
      - ${STORAGE_DIR:?set STORAGE_DIR in .env}:/storage
      - ./producer.py:/app/producer.py:ro
    command:
      [
        "--data-dir",
        "/data",
        "--kafka",
        "kafka:9092",
        "--speed",
        "50"
      ]
    networks:
      - welding-net

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: welding-api
    restart: unless-stopped
    environment:
      <<: *db-common-env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${API_PORT:-8001}:8000"
    volumes:
      - ./storage/logs:/storage/logs
    networks:
      - welding-net

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: welding-frontend
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    environment:
      API_BASE_URL: ${API_BASE_URL:-http://api:8000}
    ports:
      - "${FRONTEND_PORT:-8501}:8501"
    networks:
      - welding-net

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: welding-prometheus
    restart: unless-stopped
    profiles: ["monitoring"]
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=14d"
      - "--web.enable-lifecycle"
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - welding-net

  grafana:
    image: grafana/grafana:11.2.0
    container_name: welding-grafana
    restart: unless-stopped
    profiles: ["monitoring"]
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_DOMAIN: localhost
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      prometheus:
        condition: service_started
    networks:
      - welding-net

  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.7.0
    container_name: welding-kafka-exporter
    restart: unless-stopped
    profiles: ["monitoring"]
    command:
      - "--kafka.server=kafka:9092"
      - "--web.listen-address=:9308"
      - "--topic.filter=^welding\\..*"
      - "--group.filter=^welding\\..*"
    ports:
      - "${KAFKA_EXPORTER_PORT:-9308}:9308"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - welding-net

  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.16.0
    container_name: welding-postgres-exporter
    restart: unless-stopped
    profiles: ["monitoring"]
    environment:
      DATA_SOURCE_NAME: postgresql://${POSTGRES_USER:-welding}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-welding_drift}?sslmode=disable
    ports:
      - "${POSTGRES_EXPORTER_PORT:-9187}:9187"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - welding-net

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: welding-cadvisor
    restart: unless-stopped
    profiles: ["monitoring"]
    ports:
      - "${CADVISOR_PORT:-8088}:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    networks:
      - welding-net

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: welding-node-exporter
    restart: unless-stopped
    profiles: ["monitoring"]
    command:
      - "--path.rootfs=/host"
    ports:
      - "${NODE_EXPORTER_PORT:-9100}:9100"
    volumes:
      - /:/host:ro
    networks:
      - welding-net

volumes:
  airflow-logs:
  zk-data:
  zk-log:
  kafka-data:
  postgres-data:
  spark-events:
  spark-batch-output:
  prometheus-data:
  grafana-data:

networks:
  welding-net:
    driver: bridge


